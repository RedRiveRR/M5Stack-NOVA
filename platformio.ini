[platformio]
default_envs = stick_c_plus2
src_dir = src
include_dir = include

[env]
platform = espressif32@^6.4.0
framework = arduino
monitor_speed = 115200
lib_deps = 
	m5stack/M5Unified@^0.1.14
	z3t0/IRremote@^4.4.1
build_flags = 
	-DCORE_DEBUG_LEVEL=0
board_build.partitions = huge_app.csv

[env:stick_c_plus]
board = m5stick-c
build_flags = 
	${env.build_flags}
	-DSTICK_C_PLUS

[env:stick_c_plus2]
board = m5stick-c
build_flags = 
	${env.build_flags}
	-DSTICK_C_PLUS2

[env:stick_s3]
board = m5stack-stamps3
build_flags = 
	${env.build_flags}
	-DSTICKS3

[env:cardputer]
board = m5stack-stamps3
lib_deps = 
	${env.lib_deps}
	m5stack/M5Cardputer@^1.0.3
build_flags = 
	${env.build_flags}
	-DCARDPUTER
